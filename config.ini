[SERVER]
# Set database path for network deployment
# Examples:
# Local: E:\tasma_booking_syst\bookings.db
# Network (Windows UNC): \\SERVER_NAME\share\bookings.db
database_path = E:\tasma_booking_syst\bookings.db

# Database connection timeout in seconds
db_timeout = 60

# Cache settings for faster startup
enable_cache = true
cache_timeout = 300

# UI performance settings
lazy_load_ui = true
preload_assets = true

[LOGGING]
# Set to true for debugging
debug_mode = false
log_file = tasma_app.log

[PERFORMANCE]
# Connection pool settings
connection_pool_size = 5
# Batch size for operations
batch_size = 100
